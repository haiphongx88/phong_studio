<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOS Studio Lab | Technical CGI</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --accent: #ff6600; 
            --subtext: #a0a0a0;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; line-height: 1.6; overflow-x: hidden; }

        /* Navigation */
        nav { padding: 30px; position: fixed; width: 100%; top: 0; display: flex; justify-content: space-between; z-index: 100; backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
        .logo { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--accent); letter-spacing: 2px; }

        /* Section 1: Hero Container */
        .video-container { 
            width: 100%; 
            height: 90vh; 
            background: #000; 
            position: relative;
            margin-top: 80px; 
            overflow: hidden; 
            border-bottom: 1px solid var(--border); 
        }

        /* Surgical Fix: Targeted class for Hero only */
        .hero-iframe { 
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 56.25vw; 
            min-height: 90vh;
            min-width: 160vh; 
            transform: translate(-50%, -50%);
            border: none;
            pointer-events: none;
        }
        
        /* Headers */
        .section-header { padding: 100px 20px 40px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .section-title { font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; color: var(--accent); text-transform: uppercase; letter-spacing: 6px; margin-bottom: 15px; }
        .section-sub { font-size: 1.1rem; color: var(--subtext); max-width: 700px; font-weight: 300; line-height: 1.8; }

        /* Grids */
        .pipeline-grid, .motion-grid { display: grid; gap: 20px; padding: 0 40px 100px; }
        .pipeline-grid { grid-template-columns: repeat(4, 1fr); }
        .motion-grid { grid-template-columns: repeat(3, 1fr); }

        /* Gallery Item */
        .gallery-item { position: relative; overflow: hidden; aspect-ratio: 16 / 9; background: #111; border: 1px solid var(--border); transition: transform 0.5s ease; }
        .gallery-item:hover { transform: translateY(-5px); border-color: var(--accent); }
        .gallery-item img, .gallery-item iframe { width: 100%; height: 100%; object-fit: cover; display: block; border: none; }
        
        .gallery-label { 
            position: absolute; 
            bottom: 15px; 
            left: 15px; 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 0.65rem; 
            background: rgba(0,0,0,0.9); 
            padding: 4px 8px; 
            border-left: 2px solid var(--accent);
            letter-spacing: 1px;
            z-index: 5;
        }

        .footer { padding: 80px 20px; text-align: center; border-top: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: #444; letter-spacing: 1px; }

        /* MOBILE FIX */
        @media (max-width: 768px) {
            .video-container {
                height: 35vh; 
                margin-top: 60px;
            }
            .hero-iframe {
                width: 177.78vh !important; 
                min-height: 0 !important; 
                min-width: 0 !important; 
                height: 100% !important;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }
            .pipeline-grid, .motion-grid { grid-template-columns: 1fr; padding: 0 20px 60px; }
            .section-header { padding: 60px 20px 30px; }
            .section-title { font-size: 0.7rem; letter-spacing: 3px; }
            .section-sub { font-size: 0.85rem; padding: 0 15px; line-height: 1.5; }
        }
    </style>
</head>
